<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Cup Dashboard</title>

    <style>

        body {
            font-family: Arial;
        }

        #graph {
            border: 3px solid black;
        }

        .alert {
            animation: blink 1s infinite;
            border: 6px solid red !important;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 400px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        .tables-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }        

    </style>

</head>

<body>

    <h1>ESP32 Cup Dashboard</h1>

    <h2 style="font-size: 36px; font-weight: bold;">
        Current Weight:
        <span id="weight">0</span> g
    </h2>

    <!-- 
    <p>Weight: <span id="weight">0</span> g</p> 
    <p>Tilt: <span id="tilt">0</span> °</p> 
    -->

    <canvas
        id="graph"
        width="900"
        height="450">
    </canvas>

    <div class="tables-container">

        <div>

            <h2>Water Events</h2>

            <table id="alertTable">

                <tr>
                    <th>Time</th>
                    <th>Water</th>
                </tr>

            </table>

        </div>

        <div>

            <!-- <h2>Drinking Streak</h2>-->
            <h2 id="streakHeader"></h2>

            <table id="streakTable">

                <tr>
                    <th>Time</th>
                    <th>Drinking Streak</th>
                </tr>

            </table>

        </div>

    </div>   

    <script>

        let previousWeight = null;

        const WEIGHT_CHANGE_THRESHOLD = 20;

        const weightHistory = [];

        let lastStableWeight = 0;

        let alertActive = false;

        const canvas = document.getElementById("graph");

        const ctx = canvas.getContext("2d");

        const alertTable =
            document.getElementById("alertTable");

        // winning streak variables
        let drinkingStreak = 0;

        let hourlyDrunkAmount = 0;

        // let currentHour =
        //     new Date().getHours();

        let streakWindowStart =
            Date.now();

        const STREAK_THRESHOLD = 200;

        document.getElementById("streakHeader").innerText =
            "Drinking Streak (" +
            STREAK_THRESHOLD +
            "ml / 10s)";

        const STREAK_WINDOW_MS = 10000;        

        const streakTable =
            document.getElementById("streakTable");            

        async function updateData() {

            const response = await fetch("/data");

            const data = await response.json();

            document.getElementById("weight").innerText =
                data.weight;

            // document.getElementById("tilt").innerText =
            //    data.tilt;

            // -----------------------------
            // Drinking mode
            // -----------------------------

            let graphWeight;

            if (data.weight <= 0) {

                graphWeight = lastStableWeight;

            } else {

                graphWeight = data.weight;

                lastStableWeight = data.weight;
            }

            weightHistory.push(graphWeight);

            if (weightHistory.length > 50) {
                weightHistory.shift();
            }

            // -----------------------------
            // Tilt alert
            // -----------------------------

            if (data.tilt > 45) {

                // Red blinking border
                canvas.classList.add("alert");

                // Add alert only once
                if (!alertActive) {

                    alertActive = true;

                    addAlertRow("alert", "red");
                }

            } else {

                canvas.classList.remove("alert");

                alertActive = false;
            }

            // -----------------------------
            // Water change detection
            // -----------------------------

            if (previousWeight !== null) {

                const diff = data.weight - previousWeight;

                // Water added
                if (diff > WEIGHT_CHANGE_THRESHOLD) {

                    addAlertRow(
                        Math.round(diff) + "g added",
                        "blue"
                    );
                }

                // Water drunk
                else if (diff < -WEIGHT_CHANGE_THRESHOLD) {

                    hourlyDrunkAmount += Math.abs(diff);
                    addAlertRow(
                        Math.round(Math.abs(diff)) + "g drunk",
                        "green"
                    );
                }
            }

            previousWeight = data.weight;    
            
            // -----------------------------
            // Hourly streak logic
            // -----------------------------

            // const now = new Date();

            // const hourNow = now.getHours();

            // if (hourNow !== currentHour) {

            //     // Successful hour
            //     if (hourlyDrunkAmount >= STREAK_THRESHOLD) {

            //         drinkingStreak += 1;

            //         addStreakRow(
            //             hourlyDrunkAmount,
            //             drinkingStreak
            //         );

            //     } else {

            //         // Reset streak
            //         drinkingStreak = 0;
            //     }

            //     // Reset for next hour
            //     hourlyDrunkAmount = 0;

            //     currentHour = hourNow;
            // } 
            

            // -----------------------------
            // 10-second streak logic
            // -----------------------------

            const nowMs = Date.now();

            if (
                nowMs - streakWindowStart
                >= STREAK_WINDOW_MS
            ) {

                // Successful streak window
                if (hourlyDrunkAmount >= STREAK_THRESHOLD) {

                    drinkingStreak += 1;

                    addStreakRow(
                        hourlyDrunkAmount,
                        drinkingStreak
                    );

                } else {

                    drinkingStreak = 0;
                }

                // Reset window
                hourlyDrunkAmount = 0;

                streakWindowStart = nowMs;
            }            

            drawGraph();
        }

        function addAlertRow(message, color) {

            const row = alertTable.insertRow(-1);

            const timeCell = row.insertCell(0);

            const waterCell = row.insertCell(1);

            const now = new Date();

            const timeString =
                now.getHours().toString().padStart(2, '0')
                + ":"
                + now.getMinutes().toString().padStart(2, '0')
                + ":"
                + now.getSeconds().toString().padStart(2, '0');

            timeCell.innerText = timeString;

            waterCell.innerText = message;

            waterCell.style.color = color;

            waterCell.style.fontWeight = "bold";
        }

        function addStreakRow(amount, streak) {

            const row = streakTable.insertRow(-1);

            const timeCell = row.insertCell(0);

            const streakCell = row.insertCell(1);

            const now = new Date();

            const timeString =
                now.getHours().toString().padStart(2, '0')
                + ":"
                + now.getMinutes().toString().padStart(2, '0')
                + ":"
                + now.getSeconds().toString().padStart(2, '0');

            timeCell.innerText = timeString;

            streakCell.innerText =
                Math.round(amount)
                + "ml drunk - streak "
                + streak;

            streakCell.style.color = "purple";

            streakCell.style.fontWeight = "bold";
        }        

        function drawGraph() {

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            const marginLeft = 80;
            const marginBottom = 60;
            const marginTop = 20;
            const marginRight = 20;

            const graphWidth =
                canvas.width - marginLeft - marginRight;

            const graphHeight =
                canvas.height - marginTop - marginBottom;

            if (weightHistory.length < 2) {
                return;
            }                

            // Dynamic scaling
            const maxWeight =
                Math.max(...weightHistory);

            const minWeight =
                Math.min(...weightHistory);

            const range =
                maxWeight - minWeight || 1;

            // Axes
            ctx.beginPath();

            ctx.moveTo(marginLeft, marginTop);

            ctx.lineTo(
                marginLeft,
                canvas.height - marginBottom
            );

            ctx.lineTo(
                canvas.width - marginRight,
                canvas.height - marginBottom
            );

            ctx.stroke();


            // -----------------------------
            // Y-axis ticks
            // -----------------------------

            ctx.font = "14px Arial";

            const tickStep = 50;

            const maxTick =
                Math.ceil(maxWeight / tickStep) * tickStep;

            const minTick =
                Math.floor(minWeight / tickStep) * tickStep;

            for (
                let tick = minTick;
                tick <= maxTick;
                tick += tickStep
            ) {

                const y =
                    canvas.height - marginBottom -
                    ((tick - minWeight) / range)
                    * graphHeight;

                // Tick mark
                ctx.beginPath();

                ctx.moveTo(marginLeft - 10, y);

                ctx.lineTo(marginLeft, y);

                ctx.stroke();

                // Tick label
                ctx.fillText(
                    tick + "ml",
                    10,
                    y + 5
                );
            }           
            

            // -----------------------------
            // X-axis ticks
            // -----------------------------

            for (let i = 0; i <= 50; i += 10) {

                const x =
                    marginLeft +
                    (i / 50) * graphWidth;

                // Tick mark
                ctx.beginPath();

                ctx.moveTo(
                    x,
                    canvas.height - marginBottom
                );

                ctx.lineTo(
                    x,
                    canvas.height - marginBottom + 10
                );

                ctx.stroke();

                // Tick label
                ctx.fillText(
                    (50 - i) + "s",
                    x - 10,
                    canvas.height - marginBottom + 30
                );
            }            


            // Labels
            ctx.font = "20px Arial";

            ctx.fillText(
                "Time",
                canvas.width / 2,
                canvas.height - 15
            );

            ctx.save();

            ctx.translate(25, canvas.height / 2);

            ctx.rotate(-Math.PI / 2);

            ctx.fillText("Water Weight", 0, 0);

            ctx.restore();





            // Draw line
            for (let i = 1; i < weightHistory.length; i++) {

                const x1 =
                    marginLeft +
                    ((i - 1) / 49) * graphWidth;

                const y1 =
                    canvas.height - marginBottom -
                    ((weightHistory[i - 1] - minWeight)
                    / range) * graphHeight;

                const x2 =
                    marginLeft +
                    (i / 49) * graphWidth;

                const y2 =
                    canvas.height - marginBottom -
                    ((weightHistory[i] - minWeight)
                    / range) * graphHeight;

                ctx.beginPath();

                ctx.moveTo(x1, y1);

                ctx.lineTo(x2, y2);

                ctx.stroke();
            }
        }

        setInterval(updateData, 1000);

        updateData();

    </script>

</body>
</html>
