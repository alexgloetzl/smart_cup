<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Cup Dashboard</title>

    <style>

        body {
            font-family: Arial;
        }

        #graph {
            border: 3px solid black;
        }

        .alert {
            animation: blink 1s infinite;
            border: 6px solid red !important;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 400px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

    </style>

</head>

<body>

    <h1>ESP32 Cup Dashboard</h1>

    <p>Weight: <span id="weight">0</span> g</p>

    <p>Tilt: <span id="tilt">0</span> °</p>

    <canvas
        id="graph"
        width="900"
        height="450">
    </canvas>

    <h2>Alerts</h2>

    <table id="alertTable">

        <tr>
            <th>Time</th>
            <th>Water</th>
        </tr>

    </table>

    <script>

        const weightHistory = [];

        let lastStableWeight = 0;

        let alertActive = false;

        const canvas = document.getElementById("graph");

        const ctx = canvas.getContext("2d");

        const alertTable =
            document.getElementById("alertTable");

        async function updateData() {

            const response = await fetch("/data");

            const data = await response.json();

            document.getElementById("weight").innerText =
                data.weight;

            document.getElementById("tilt").innerText =
                data.tilt;

            // -----------------------------
            // Drinking mode
            // -----------------------------

            let graphWeight;

            if (data.weight <= 0) {

                graphWeight = lastStableWeight;

            } else {

                graphWeight = data.weight;

                lastStableWeight = data.weight;
            }

            weightHistory.push(graphWeight);

            if (weightHistory.length > 50) {
                weightHistory.shift();
            }

            // -----------------------------
            // Tilt alert
            // -----------------------------

            if (data.tilt > 45) {

                // Red blinking border
                canvas.classList.add("alert");

                // Add alert only once
                if (!alertActive) {

                    alertActive = true;

                    addAlertRow();
                }

            } else {

                canvas.classList.remove("alert");

                alertActive = false;
            }

            drawGraph();
        }

        function addAlertRow() {

            const row = alertTable.insertRow(-1);

            const timeCell = row.insertCell(0);

            const waterCell = row.insertCell(1);

            const now = new Date();

            const timeString =
                now.getHours().toString().padStart(2, '0')
                + ":"
                + now.getMinutes().toString().padStart(2, '0')
                + ":"
                + now.getSeconds().toString().padStart(2, '0');

            timeCell.innerText = timeString;

            waterCell.innerText = "alert";
        }

        function drawGraph() {

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            const marginLeft = 80;
            const marginBottom = 60;
            const marginTop = 20;
            const marginRight = 20;

            const graphWidth =
                canvas.width - marginLeft - marginRight;

            const graphHeight =
                canvas.height - marginTop - marginBottom;

            // Axes
            ctx.beginPath();

            ctx.moveTo(marginLeft, marginTop);

            ctx.lineTo(
                marginLeft,
                canvas.height - marginBottom
            );

            ctx.lineTo(
                canvas.width - marginRight,
                canvas.height - marginBottom
            );

            ctx.stroke();

            // Labels
            ctx.font = "20px Arial";

            ctx.fillText(
                "Time",
                canvas.width / 2,
                canvas.height - 15
            );

            ctx.save();

            ctx.translate(25, canvas.height / 2);

            ctx.rotate(-Math.PI / 2);

            ctx.fillText("Water Weight", 0, 0);

            ctx.restore();

            if (weightHistory.length < 2) {
                return;
            }

            // Dynamic scaling
            const maxWeight =
                Math.max(...weightHistory);

            const minWeight =
                Math.min(...weightHistory);

            const range =
                maxWeight - minWeight || 1;

            // Draw line
            for (let i = 1; i < weightHistory.length; i++) {

                const x1 =
                    marginLeft +
                    ((i - 1) / 49) * graphWidth;

                const y1 =
                    canvas.height - marginBottom -
                    ((weightHistory[i - 1] - minWeight)
                    / range) * graphHeight;

                const x2 =
                    marginLeft +
                    (i / 49) * graphWidth;

                const y2 =
                    canvas.height - marginBottom -
                    ((weightHistory[i] - minWeight)
                    / range) * graphHeight;

                ctx.beginPath();

                ctx.moveTo(x1, y1);

                ctx.lineTo(x2, y2);

                ctx.stroke();
            }
        }

        setInterval(updateData, 1000);

        updateData();

    </script>

</body>
</html>
