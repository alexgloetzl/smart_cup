<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Cup Dashboard</title>

    <style>

        body {
            font-family: Arial;
        }

        #graph {
            border: 3px solid black;
        }

        .alert {
            animation: blink 1s infinite;
            border: 6px solid red !important;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 400px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        .tables-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }        

    </style>

</head>

<body>

    <h1>ESP32 Cup Dashboard</h1>

    <h2 id="highestStreakDisplay"
        style="font-size: 28px; font-weight: bold; color: purple;">
        Highest Streak: 0
    </h2>    

    <div style="
        display: flex;
        gap: 80px;
        align-items: center;
    ">

        <h2 style="
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        ">
            Current Weight:
            <span id="weight">0</span>g
        </h2>

        <h2 style="
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        ">
            Tilt:
            <span id="tilt">0</span>&deg;
        </h2>

    </div>

    <!-- 
    <p>Weight: <span id="weight">0</span> g</p> 
    <p>Tilt: <span id="tilt">0</span> °</p> 
    -->

    <canvas
        id="graph"
        width="900"
        height="450">
    </canvas>


    <div style="margin-top: 20px;">

        <h2>
            Daily Goal Progress
        </h2>

        <h2 id="goalAmountText">
            0ml / 3000ml drunk
        </h2>        

        <div id="goalBarsContainer"></div>

    </div>


    <div class="tables-container">

        <div>

            <h2>Water Events</h2>

            <table id="alertTable">

                <tr>
                    <th>Time</th>
                    <th>Water</th>
                </tr>

            </table>

        </div>

        <div>

            <!-- <h2>Drinking Streak</h2>-->
            <h2 id="streakHeader"></h2>

            <table id="streakTable">

                <tr>
                    <th>Time</th>
                    <th>Drinking Streak</th>
                </tr>

            </table>

        </div>

    </div>   

    <script>

        let previousWeight = null;

        const WEIGHT_CHANGE_THRESHOLD = 20;

        const weightHistory = [];

        let lastStableWeight = 0;

        let alertActive = false;

        const canvas = document.getElementById("graph");

        const ctx = canvas.getContext("2d");

        const alertTable =
            document.getElementById("alertTable");

        // winning streak variables
        let drinkingStreak = 0;

        let highestStreak = 0;  

        let hourlyDrunkAmount = 0;

        // let currentHour =
        //     new Date().getHours();

        let streakWindowStart =
            Date.now();
        const STREAK_THRESHOLD = 200;

        document.getElementById("streakHeader").innerText =
            "Hourly Drinking Streak (" +
            STREAK_THRESHOLD +
            "ml / 10s)";

        const STREAK_WINDOW_MS = 10000;     
        
        const MAX_TABLE_ROWS = 15;

        const streakTable =
            document.getElementById("streakTable");  
            

        const GOAL_TARGET = 3000;

        const GOAL_WINDOW_MS = 10000;
        const GOAL_TOTAL_WINDOWS = 24;
        let goalBars = [
            {
                amount: 0,
                completedWindows: 0,
                startTime: Date.now()
            }
        ];

          

        async function updateData() {

            const response = await fetch("/data");

            const data = await response.json();

            document.getElementById("weight").innerText =
                data.weight;

            document.getElementById("tilt").innerText =
                Number(data.tilt).toFixed(2);

            // -----------------------------
            // Drinking mode
            // -----------------------------

            let graphWeight;

            if (data.weight <= 0) {

                graphWeight = lastStableWeight;

            } else {

                graphWeight = data.weight;

                lastStableWeight = data.weight;
            }

            weightHistory.push(graphWeight);

            if (weightHistory.length > 50) {
                weightHistory.shift();
            }

            // -----------------------------
            // Tilt alert
            // -----------------------------

            if (data.tilt > 45) {

                // Red blinking border
                canvas.classList.add("alert");

                // Add alert only once
                if (!alertActive) {

                    alertActive = true;

                    addAlertRow("alert", "red");
                }

            } else {

                canvas.classList.remove("alert");

                alertActive = false;
            }

            // -----------------------------
            // Water change detection
            // -----------------------------

            if (previousWeight !== null) {

                const diff = data.weight - previousWeight;

                // Water added
                if (diff > WEIGHT_CHANGE_THRESHOLD) {

                    addAlertRow(
                        Math.round(diff) + "g added",
                        "blue"
                    );
                }

                // Water drunk
                else if (diff < -WEIGHT_CHANGE_THRESHOLD) {

                    goalBars[
                        goalBars.length - 1
                    ].amount += Math.abs(diff);

                    hourlyDrunkAmount += Math.abs(diff);
                    addAlertRow(
                        Math.round(Math.abs(diff)) + "g drunk",
                        "green"
                    );
                }
            }

            previousWeight = data.weight;    
            
            // -----------------------------
            // Hourly streak logic
            // -----------------------------

            // const now = new Date();

            // const hourNow = now.getHours();

            // if (hourNow !== currentHour) {

            //     // Successful hour
            //     if (hourlyDrunkAmount >= STREAK_THRESHOLD) {

            //         drinkingStreak += 1;

            //         addStreakRow(
            //             hourlyDrunkAmount,
            //             drinkingStreak
            //         );

            //     } else {

            //         // Reset streak
            //         drinkingStreak = 0;
            //     }

            //     // Reset for next hour
            //     hourlyDrunkAmount = 0;

            //     currentHour = hourNow;
            // } 
            

            // -----------------------------
            // 10-second streak logic
            // -----------------------------

            const nowMs = Date.now();

            if (
                nowMs - streakWindowStart
                >= STREAK_WINDOW_MS
            ) {

                // Successful streak window
                if (hourlyDrunkAmount >= STREAK_THRESHOLD) {

                    drinkingStreak += 1;

                    if (drinkingStreak > highestStreak) {

                        highestStreak = drinkingStreak;

                        document.getElementById(
                            "highestStreakDisplay"
                        ).innerText =
                            "Highest Drinking Streak: "
                            + highestStreak;
                    }

                    addStreakRow(
                        hourlyDrunkAmount,
                        drinkingStreak
                    );

                } else {

                    drinkingStreak = 0;
                }

                // Reset window
                hourlyDrunkAmount = 0;

                streakWindowStart = nowMs;
            }            


            // -----------------------------
            // Goal bar logic
            // -----------------------------

            renderGoalBars();

            const currentGoalBar =
                goalBars[
                    goalBars.length - 1
                ];

            if (
                Date.now()
                - currentGoalBar.startTime
                >= GOAL_WINDOW_MS
            ) {

                currentGoalBar.completedWindows += 1;

                currentGoalBar.startTime =
                    Date.now();

                // Full 24-window cycle finished
                if (
                    currentGoalBar.completedWindows
                    >= GOAL_TOTAL_WINDOWS
                ) {

                    goalBars.push({
                        amount: 0,
                        completedWindows: 0,
                        startTime: Date.now()
                    });
                }
            }


            drawGraph();
        }

        function addAlertRow(message, color) {

            const row = alertTable.insertRow(-1);

            const timeCell = row.insertCell(0);

            const waterCell = row.insertCell(1);

            const now = new Date();

            const timeString =
                now.getHours().toString().padStart(2, '0')
                + ":"
                + now.getMinutes().toString().padStart(2, '0')
                + ":"
                + now.getSeconds().toString().padStart(2, '0');

            timeCell.innerText = timeString;

            waterCell.innerText = message;

            waterCell.style.color = color;

            waterCell.style.fontWeight = "bold";

            limitTableRows(alertTable);
        }

        function addStreakRow(amount, streak) {

            const row = streakTable.insertRow(-1);

            const timeCell = row.insertCell(0);

            const streakCell = row.insertCell(1);

            const now = new Date();

            const timeString =
                now.getHours().toString().padStart(2, '0')
                + ":"
                + now.getMinutes().toString().padStart(2, '0')
                + ":"
                + now.getSeconds().toString().padStart(2, '0');

            timeCell.innerText = timeString;

            let smiley = ":)";

            if (streak >= 2) {
                smiley = "=)";
            }

            if (streak >= 3) {
                smiley = ":D";
            }

            if (streak >= 4) {
                smiley = ":D :D";
            }

            if (streak >= 6) {
                smiley = ":D :D :D";
            }            

            // streakCell.innerText =
            //     Math.round(amount)
            //     + "ml drunk - streak "
            //     + streak
            //     + " "
            //     + smiley;

            streakCell.innerText =
                "Streak "
                + streak
                + " ("
                + Math.round(amount)
                + "ml drunk) "
                + smiley;         

            streakCell.style.color = "purple";

            streakCell.style.fontWeight = "bold";

            limitTableRows(streakTable);
        }        

        function limitTableRows(table) {

            // Keep header row + latest rows
            while (
                table.rows.length >
                MAX_TABLE_ROWS + 1
            ) {

                table.deleteRow(1);
            }
        }    
        
        function renderGoalBars() {

            const container =
                document.getElementById(
                    "goalBarsContainer"
                );

            container.innerHTML = "";

            for (const goalBar of goalBars) {

                const currentGoalBar =
                    goalBars[
                        goalBars.length - 1
                    ];

                document.getElementById(
                    "goalAmountText"
                ).innerText =
                    Math.round(currentGoalBar.amount)
                    + "ml / "
                    + GOAL_TARGET
                    + "ml drunk";                

                const wrapper =
                    document.createElement("div");

                wrapper.style.display = "flex";

                wrapper.style.alignItems = "center";

                wrapper.style.gap = "20px";

                wrapper.style.marginBottom = "10px";

                // -----------------------------
                // ASCII loading bar
                // -----------------------------

                const progress =
                    Math.min(
                        goalBar.amount / GOAL_TARGET,
                        1
                    );

                const totalBars = 20;

                const filledBars =
                    Math.round(progress * totalBars);

                const asciiBar =
                    "[" +
                    "#".repeat(filledBars) +
                    "-".repeat(
                        totalBars - filledBars
                    ) +
                    "]";

                const bar =
                    document.createElement("pre");

                bar.style.fontSize = "24px";

                bar.style.fontWeight = "bold";

                bar.style.margin = "0";

                bar.innerText = asciiBar;

                wrapper.appendChild(bar);

                // -----------------------------
                // Window counter
                // -----------------------------

                const counter =
                    document.createElement("div");

                counter.style.fontWeight =
                    "bold";

                counter.style.fontSize =
                    "20px";

                counter.innerText =
                    goalBar.completedWindows
                    + " hours / 24 elapsed";

                wrapper.appendChild(counter);

                // -----------------------------
                // Goal reached message
                // -----------------------------

                if (
                    goalBar.amount >= GOAL_TARGET
                ) {

                    const msg =
                        document.createElement("div");

                    msg.style.color = "green";

                    msg.style.fontWeight =
                        "bold";

                    msg.innerText =
                        "DAILY GOAL REACHED!";

                    wrapper.appendChild(msg);
                }

                container.appendChild(wrapper);
            }
        }        

        function drawGraph() {

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            const marginLeft = 110;
            const marginBottom = 60;
            const marginTop = 20;
            const marginRight = 20;

            const graphWidth =
                canvas.width - marginLeft - marginRight;

            const graphHeight =
                canvas.height - marginTop - marginBottom;

            if (weightHistory.length < 2) {
                return;
            }                

            // Dynamic scaling
            const maxWeight =
                Math.max(...weightHistory);

            const minWeight =
                Math.min(...weightHistory);

            const range =
                maxWeight - minWeight || 1;

            // Axes
            ctx.beginPath();

            ctx.moveTo(marginLeft, marginTop);

            ctx.lineTo(
                marginLeft,
                canvas.height - marginBottom
            );

            ctx.lineTo(
                canvas.width - marginRight,
                canvas.height - marginBottom
            );

            ctx.stroke();


            // -----------------------------
            // Y-axis ticks
            // -----------------------------

            ctx.font = "14px Arial";

            const tickStep = 100;

            const maxTick =
                Math.ceil(maxWeight / tickStep) * tickStep;

            const minTick =
                Math.floor(minWeight / tickStep) * tickStep;

            for (
                let tick = minTick;
                tick <= maxTick;
                tick += tickStep
            ) {

                const y =
                    canvas.height - marginBottom -
                    ((tick - minWeight) / range)
                    * graphHeight;

                // Tick mark
                ctx.beginPath();

                ctx.moveTo(marginLeft - 10, y);

                ctx.lineTo(marginLeft, y);

                ctx.stroke();

                ctx.fillText(
                    tick + "ml",
                    marginLeft - 60,
                    y + 5
                );
            }           
            

            // -----------------------------
            // X-axis ticks
            // -----------------------------

            for (let i = 0; i <= 50; i += 10) {

                const x =
                    marginLeft +
                    (i / 50) * graphWidth;

                // Tick mark
                ctx.beginPath();

                ctx.moveTo(
                    x,
                    canvas.height - marginBottom
                );

                ctx.lineTo(
                    x,
                    canvas.height - marginBottom + 10
                );

                ctx.stroke();

                // Tick label
                ctx.fillText(
                    (50 - i) + "s",
                    x - 10,
                    canvas.height - marginBottom + 30
                );
            }            


            // Labels
            ctx.font = "20px Arial";

            ctx.fillText(
                "Time",
                canvas.width / 2,
                canvas.height - 15
            );

            ctx.save();

            ctx.translate(25, canvas.height / 2);

            ctx.rotate(-Math.PI / 2);

            ctx.fillText("Water Weight", 0, 0);

            ctx.restore();





            // Draw line
            for (let i = 1; i < weightHistory.length; i++) {

                const x1 =
                    marginLeft +
                    ((i - 1) / 49) * graphWidth;

                const y1 =
                    canvas.height - marginBottom -
                    ((weightHistory[i - 1] - minWeight)
                    / range) * graphHeight;

                const x2 =
                    marginLeft +
                    (i / 49) * graphWidth;

                const y2 =
                    canvas.height - marginBottom -
                    ((weightHistory[i] - minWeight)
                    / range) * graphHeight;

                ctx.beginPath();

                ctx.moveTo(x1, y1);

                ctx.lineTo(x2, y2);

                ctx.stroke();
            }
        }

        setInterval(updateData, 1000);

        updateData();

    </script>

</body>
</html>
